<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'">
    <title>Epic Pen</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="toolbar">
        <button id="clearBtn">Clear</button>

        <!-- 🎨 Color Palette -->
        <div id="colorPalette">
            <button class="color-btn" style="background: red;" data-color="#ff0000"></button>
            <button class="color-btn" style="background: blue;" data-color="#0000ff"></button>
            <button class="color-btn" style="background: green;" data-color="#008000"></button>
            <button class="color-btn" style="background: yellow;" data-color="#ffff00"></button>
            <button class="color-btn" style="background: black;" data-color="#000000"></button>
            <button class="color-btn" style="background: purple;" data-color="#800080"></button>
        </div>

        <!-- 🎨 Custom Color Picker -->
        <input type="color" id="colorPicker">

        <!-- 🔧 Pen Size -->
        <input type="range" id="sizePicker" min="1" max="10" value="2">

        <!-- 🔄 Click-Through Mode -->
        <button id="clickThroughBtn">Toggle Click-Through</button>

        <!-- ❌ Close Button -->
        <button id="closeBtn">Close</button>
    </div>

    <canvas id="drawCanvas"></canvas>
    <script src="renderer.js"></script>
</body>
</html>
