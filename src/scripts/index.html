<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Epic Pen</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="toolbar">
        <button id="pencilBtn">
            <img src="./src/scripts/images/pencil.png" alt="Pencil">
        </button>
        <button id="textBtn">
            <img src="./src/scripts/images/text.png" alt="Text">
        </button>
        <button id="eraserBtn">
          <img src="./src/scripts/images/eraser.png" alt="Eraser">
        </button>
        <button id="clearBtn">
            <img src="./src/scripts/images/dustbin.png" alt="Clear">
        </button>
    </div>

    <canvas id="canvas"></canvas>
    <script type="module" src="./src/scripts/renderer.js"></script>

</body>
</html>
