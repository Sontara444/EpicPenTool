<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Drawing App</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <canvas id="canvas"></canvas>

    <!-- 👁️ Eye Toggle Button (now part of toolbar) -->
    <div class="toolbar" id="toolbar">
      <button id="hamburgerToggle" class="tool-button" title="Toggle Toolbar">
        <img src="./scripts/images/eye.png" alt="Eye Toggle" />
      </button>
      <button id="toggleBtn" class="tool-button toggle-on" title="Toggle Mode">
        <img src="./scripts/images/arrow.png" alt="Toggle" />
      </button>
      <button id="pencilBtn" class="tool-button active" title="Pencil">
        <img src="./scripts/images/pencil.png" alt="Pencil" />
      </button>
      <button id="eraserBtn" class="tool-button" title="Eraser">
        <img src="./scripts/images/eraser.png" alt="Eraser" />
      </button>

      <div class="thickness-options">
        <button class="thickness-dot" data-size="2" title="Thin"></button>
        <button class="thickness-dot" data-size="4" title="Medium"></button>
        <button class="thickness-dot" data-size="8" title="Thick"></button>
        <button class="thickness-dot" data-size="14" title="Extra Thick"></button>
      </div>

      <button id="clearBtn" class="tool-button" title="Clear">
        <img src="./scripts/images/clear.png" alt="Clear" />
      </button>
    </div>

    <script type="module" src="./scripts/renderer.js"></script>
  </body>
</html>
