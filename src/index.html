<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Drawing App</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <canvas id="canvas"></canvas>

    <div class="toolbar" id="toolbar">
      <!-- Eye / Hamburger Button at the top of toolbar -->
      <button
        id="hamburgerToggle"
        class="tool-button"
        title="Show/Hide Tools"
      >
        <img
          id="eyeIcon"
          src="./scripts/images/eye.png"
          alt="Toggle Visibility"
        />
      </button>
    
      <button id="toggleBtn" class="tool-button toggle-on" title="Toggle Mode">
        <img src="./scripts/images/arrow.png" alt="Toggle" />
      </button>
    
      <button id="pencilBtn" class="tool-button active" title="Pencil">
        <img src="./scripts/images/pencil.png" alt="Pencil" />
      </button>
    
      <button id="eraserBtn" class="tool-button" title="Eraser">
        <img src="./scripts/images/eraser.png" alt="Eraser" />
      </button>
    
      <input
        type="range"
        id="thicknessSlider"
        min="1"
        max="20"
        value="2"
        title="Thickness"
      />
    
      <button id="clearBtn" class="tool-button" title="Clear">
        <img src="./scripts/images/clear.png" alt="Clear" />
      </button>
    </div>
    

    <script type="module" src="./scripts/renderer.js"></script>
  </body>
</html>
